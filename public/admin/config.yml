backend:
  name: github
  repo: gibbyn05/altiild
  branch: main
  auth_endpoint: api/auth

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: posts
    label: Blog Posts
    folder: content/posts
    create: true
    slug: "{{slug}}"
    format: json
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Slug
        name: slug
        widget: string
      - label: Description
        name: description
        widget: text
      - label: Content
        name: body
        widget: markdown
      - label: Featured Image
        name: image
        widget: image
      - label: Author
        name: author
        widget: string
      - label: Publish Date
        name: publishedAt
        widget: datetime

  - name: pages
    label: Pages
    folder: content/pages
    create: true
    slug: "{{slug}}"
    format: json
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Slug
        name: slug
        widget: string
      - label: Description
        name: description
        widget: text
      - label: Content
        name: body
        widget: markdown
      - label: Hero Image
        name: image
        widget: image
      - label: Publish Date
        name: publishedAt
        widget: datetime
